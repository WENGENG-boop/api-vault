services:
  api-vault:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-vault
    restart: unless-stopped
    ports:
      - "3210:3210"
    environment:
      PORT: "3210"
      HOST: "0.0.0.0"
      API_VAULT_DOCKER: "1"
      # Remote clients also need their exact Host/IP explicitly allowed.
      # Example: API_VAULT_ALLOWED_HOSTS: "192.168.1.20:3210,vault.example.com"
      # API_VAULT_ALLOWED_HOSTS: "192.168.1.20:3210"
      # For remote first-time setup, read the bootstrap token from container logs.
      API_VAULT_NO_OPEN: "1"
      NODE_ENV: production
    volumes:
      - ./.api-vault:/app/.api-vault
